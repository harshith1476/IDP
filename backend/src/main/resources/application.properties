# Server Configuration
server.port=${PORT:8080}
spring.application.name=drims-backend

# H2 File-Based Database Configuration (Saved to disk)
spring.datasource.url=jdbc:h2:file:./drims_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:DRIMS_SECRET_KEY_2024_DEPARTMENT_RESEARCH_INFORMATION_MANAGEMENT_SYSTEM_SECURE_KEY}
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=uploads

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://ajp-pro.vercel.app,http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.drims=DEBUG

# External API Configuration
orcid.client.id=${ORCID_CLIENT_ID:APP-XL5QAKZXWQ9Y56SC}
orcid.client.secret=${ORCID_CLIENT_SECRET:0444ffaf-b76b-4bee-ba12-0b51806252ba}
